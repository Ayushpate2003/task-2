apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: selfsigned-issuer
spec:
  selfSigned: {}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: catalogue-tls-cert
spec:
  dnsNames:
    - catalogue.local
  secretName: catalogue-tls-secret
  issuerRef:
    name: selfsigned-issuer
    kind: Issuer
